<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow-x:hidden}
body{background:#eef0f8;color:#1a1a2e;font-family:'Space Grotesk',sans-serif}
button,input{font-family:'Space Grotesk',sans-serif;font-size:16px}
#app{max-width:680px;margin:0 auto;padding-bottom:60px}
.hdr{background:linear-gradient(135deg,#3a5bd9,#6b4fd8);padding:20px 18px;border-radius:0 0 22px 22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.hdr-logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.7);font-size:.75rem;margin-top:3px}
.hdr-copy{color:rgba(255,255,255,.4);font-size:.58rem;margin-top:3px}
.stat-box{background:rgba(255,255,255,.18);border-radius:10px;padding:8px 10px;text-align:center;min-width:50px}
.stat-val{color:#fff;font-weight:700;font-size:1.05rem;line-height:1}
.stat-lbl{color:rgba(255,255,255,.65);font-size:.52rem;letter-spacing:.05em;margin-top:2px}
.body{padding:0 14px}
.prog-lbl{display:flex;justify-content:space-between;font-size:.65rem;color:rgba(26,26,46,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.prog-track{height:4px;background:rgba(58,91,217,.15);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#3a5bd9,#6b4fd8);border-radius:99px;transition:width .5s}
.dots{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.dot{width:24px;height:5px;border-radius:3px;background:rgba(58,91,217,.15)}
.dot-done{background:#2ecc8a}.dot-active{background:#3a5bd9}
.tabs{display:flex;border-bottom:2px solid rgba(58,91,217,.1);margin-bottom:18px}
.tab{flex:1;padding:10px 4px;border:none;background:transparent;font-size:.8rem;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;color:rgba(26,26,46,.45)}
.tab-on{color:#3a5bd9;font-weight:700;border-bottom-color:#3a5bd9}
.card{background:#fff;border:1px solid rgba(58,91,217,.1);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.grp{background:#fff;border:1px solid rgba(58,91,217,.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(58,91,217,.07);position:relative;overflow:hidden}
.grp-done-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2ecc8a,#1ab5a0)}
.grp-row{display:flex;align-items:center;gap:10px}
.grp-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.grp-title{font-size:.9rem;font-weight:700;color:#1a1a2e}
.grp-words{font-size:.65rem;color:rgba(26,26,46,.4);margin-top:2px;font-family:monospace}
.badge{font-size:.62rem;padding:3px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.badge-open{background:rgba(58,91,217,.12);color:#3a5bd9;border:1px solid rgba(58,91,217,.2)}
.badge-done{background:rgba(46,204,138,.15);color:#16a065;border:1px solid rgba(46,204,138,.25)}
.btn{display:flex;align-items:center;justify-content:center;padding:13px 20px;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;width:100%;margin-top:10px}
.btn-p{background:linear-gradient(135deg,#3a5bd9,#6b4fd8);color:#fff}
.btn-o{background:#fff;color:#1a1a2e;border:1px solid rgba(26,26,46,.15)}
.inp{width:100%;background:#e8ecf5;border:1px solid rgba(58,91,217,.2);border-radius:8px;padding:13px 15px;color:#1a1a2e;font-size:16px;outline:none;margin-top:10px}
.inp:focus{border-color:#3a5bd9;background:#fff}
.inp-ok{border-color:#2ecc8a !important;background:rgba(46,204,138,.06) !important}
.inp-no{border-color:#e05555 !important;background:rgba(224,85,85,.05) !important}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.opt{background:#e8ecf5;border:1px solid rgba(58,91,217,.12);border-radius:8px;padding:13px 10px;color:#1a1a2e;font-size:.84rem;cursor:pointer;text-align:left;line-height:1.3;width:100%}
.opt-ok{border-color:#2ecc8a !important;background:rgba(46,204,138,.1) !important;color:#1ea870 !important}
.opt-no{border-color:#e05555 !important;background:rgba(224,85,85,.08) !important;color:#e05555 !important}
.pip-row{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.pip{font-size:.6rem;letter-spacing:.08em;padding:4px 10px;border-radius:99px;background:rgba(58,91,217,.08);color:rgba(58,91,217,.5);text-transform:uppercase}
.pip-active{background:rgba(58,91,217,.15);color:#3a5bd9;font-weight:600}
.pip-done{background:rgba(46,204,138,.12);color:#1ea870}
.big-word{font-family:'DM Serif Display',serif;font-size:2.4rem;margin-bottom:6px;color:#1a1a2e;line-height:1.1}
.hint{font-size:.76rem;color:rgba(26,26,46,.45);margin-bottom:4px}
.qlm{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qlm-de{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,11vw,5rem);color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.2);letter-spacing:-.02em;text-align:center;padding:0 20px;animation:pop .4s ease}
.qlm-tr{font-size:clamp(.95rem,4vw,1.4rem);color:rgba(255,255,255,.92);margin-top:12px;font-weight:500;text-align:center;padding:0 20px}
.qlm-num{position:absolute;top:22px;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.qlm-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.15)}
.qlm-fill{height:100%;background:rgba(255,255,255,.75);transition:width .08s linear}
@keyframes pop{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
.ph{background:linear-gradient(135deg,#3a5bd9,#6b4fd8);border-radius:14px;padding:16px;margin-bottom:18px;color:#fff}
.ph-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ph-back{background:rgba(255,255,255,.2);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ph-bar{height:5px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:8px}
.ph-fill{height:100%;background:rgba(255,255,255,.9);border-radius:99px;transition:width .3s}
.pmod{background:#fff;border:1px solid rgba(58,91,217,.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(58,91,217,.07);display:flex;align-items:center;gap:12px}
.pmod-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0}
.sec{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(26,26,46,.5);margin-bottom:12px;font-weight:600}
.il-bar{height:5px;background:rgba(58,91,217,.1);border-radius:99px;overflow:hidden;margin-top:4px;margin-bottom:10px}
.il-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#2ecc8a,#1ab5a0);transition:width .5s}
.srow{display:flex;justify-content:space-around;margin-bottom:16px}
.sval{font-size:1.3rem;font-weight:700;color:#1a1a2e;text-align:center}
.slbl{font-size:.7rem;color:rgba(26,26,46,.45);text-align:center}
.fc-card{min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;text-align:center}
.letters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
.letter-box{background:rgba(58,91,217,.1);border:1px solid rgba(58,91,217,.2);border-radius:7px;padding:7px 11px;font-size:1.1rem;font-family:monospace;color:#3a5bd9;font-weight:700}
.fb-ok{padding:10px 12px;border-radius:8px;margin-top:8px;font-size:.84rem;background:rgba(46,204,138,.1);color:#1ea870;border:1px solid rgba(46,204,138,.25)}
.fb-no{padding:10px 12px;border-radius:8px;margin-top:8px;font-size:.84rem;background:rgba(224,85,85,.08);color:#e05555;border:1px solid rgba(224,85,85,.2)}
.res-score{font-family:'DM Serif Display',serif;font-size:3.5rem;line-height:1;margin-bottom:6px}
.res-great{color:#1ea870}.res-ok{color:#c9900a}.res-bad{color:#e05555}
.step-badge{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:rgba(58,91,217,.1);color:#3a5bd9;font-weight:600}
</style>
</head>

function save() {

function shuf(a) {
  a = a.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function spk(text, lang) {
  try {
    if (window.responsiveVoice && responsiveVoice.voiceSupport()) {
      responsiveVoice.cancel();
      responsiveVoice.speak(text, lang === 'tr' ? 'Turkish Female' : 'Deutsch Female', {rate:0.9,volume:1});
    } else if (window.speechSynthesis) {
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = lang === 'tr' ? 'tr-TR' : 'de-DE';
      u.rate = 0.9; u.onerror = function(){};
      speechSynthesis.speak(u);
    }
  } catch(e) {}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// FLOW
// ══════════════════════════════════════
function startGroup(i) {
  gIdx = i; screen = 'flow'; stage = 0;
  qlmI = 0; qlmColorI = 0; qlmEl = 0;
  qI = 0; qAns = null; qScore = 0;
  var g = GROUPS[i];
  var others = [];
  for (var j = 0; j < GROUPS.length; j++) {
    if (j !== i) others = others.concat(GROUPS[j].words);
  }
  q1 = [];
  for (var wi = 0; wi < g.words.length; wi++) {
    var w = g.words[wi];
    var dist = shuf(others).slice(0,3).map(function(o){return o.tr;});
    q1.push({q:w.de, a:w.tr, opts:shuf([w.tr].concat(dist))});
  }
  q2 = [];
  for (var wi2 = 0; wi2 < g.words.length; wi2++) {
    var w2 = g.words[wi2];
    var dist2 = shuf(others).slice(0,3).map(function(o){return o.de;});
    q2.push({q:w2.tr, a:w2.de, opts:shuf([w2.de].concat(dist2))});
  }
  R();
  startQLM();
}

function startQLM() {
  if (qlmTimer) clearInterval(qlmTimer);
  qlmEl = 0;
  var w = GROUPS[gIdx].words[qlmI];
  setTimeout(function(){ spk(w.de, 'de'); }, 150);
  setTimeout(function(){ spk(w.tr, 'tr'); }, 700);
  qlmTimer = setInterval(function() {
    qlmEl += 80;
    qlmColorI = (qlmColorI + 1) % QCLR.length;
    var qlmEl2 = document.querySelector('.qlm');
    var fill = document.querySelector('.qlm-fill');
    if (qlmEl2) qlmEl2.style.background = QCLR[qlmColorI];
    if (fill) fill.style.width = (qlmEl / 1500 * 100) + '%';
    if (qlmEl >= 1500) {
      clearInterval(qlmTimer);
      var g = GROUPS[gIdx];
      if (qlmI + 1 < g.words.length) {
        qlmI++;
        R();
        startQLM();
      } else {
        stage = 1; qI = 0; R();
      }
    }
  }, 80);
}

function renderFlow() {
  var g = GROUPS[gIdx];
  var pip_labels = ['HÖM', 'DE→TR', 'TR→DE'];
  var pipHtml = '';
  for (var pi = 0; pi < pip_labels.length; pi++) {
    var pcls = 'pip';
    if (pi < stage) pcls += ' pip-done';
    else if (pi === stage) pcls += ' pip-active';
    pipHtml += '<div class="' + pcls + '">' + pip_labels[pi] + '</div>';
  }

  // QLM
  if (stage === 0) {
    var w = g.words[qlmI];
    return '<div class="qlm" style="background:' + QCLR[qlmColorI] + '">' +
      '<div class="qlm-num">' + (qlmI+1) + ' / ' + g.words.length + '</div>' +
      '<div class="qlm-de">' + esc(w.de) + '</div>' +
      '<div class="qlm-tr">' + esc(w.tr) + '</div>' +
      '<div class="qlm-bar"><div class="qlm-fill" style="width:0%"></div></div>' +
    '</div>';
  }

  var qs = stage === 1 ? q1 : q2;
  var total = q1.length + q2.length;

  // Bitti
  if (qI >= qs.length) {
    if (completed.indexOf(gIdx) < 0) { completed.push(gIdx); save(); }
    var pct = Math.round(qScore / total * 100);
    var cls = pct >= 80 ? 'res-great' : pct >= 50 ? 'res-ok' : 'res-bad';
    var msg = pct >= 80 ? '🎉 Harika!' : pct >= 50 ? '👍 İyi gidiyor!' : '💪 Devam et!';
    return '<div class="body" style="padding:14px">' +
      '<div class="pip-row">' + pipHtml + '</div>' +
      '<div class="card" style="text-align:center;padding:28px 20px">' +
        '<div style="font-size:2.2rem;margin-bottom:8px">🎉</div>' +
        '<div style="font-family:\'DM Serif Display\',serif;font-size:1.4rem;margin-bottom:4px">Tamamlandı!</div>' +
        '<div style="font-size:.75rem;color:rgba(26,26,46,.4);margin-bottom:16px">' + esc(g.theme) + '</div>' +
        '<div class="res-score ' + cls + '">' + pct + '%</div>' +
        '<div style="font-size:.82rem;color:rgba(26,26,46,.5);margin-bottom:20px">' + qScore + '/' + total + ' doğru — ' + msg + '</div>' +
        '<button class="btn btn-p" onclick="goHome()">← Gruplara Dön</button>' +
      '</div>' +
    '</div>';
  }

  // Soru
  var q = qs[qI];
  var stageLabel = stage === 1 ? 'Almanca → Türkçe' : 'Türkçe → Almanca';
  var optsHtml = '';
  for (var oi = 0; oi < q.opts.length; oi++) {
    var opt = q.opts[oi];
    var ocls = 'opt';
    if (qAns) {
      if (opt === q.a) ocls += ' opt-ok';
      else if (opt === qAns) ocls += ' opt-no';
    }
    optsHtml +=
      '<button class="' + ocls + '" ' + (qAns ? 'disabled' : '') +
      ' onclick="ansQ(' + oi + ')">' + esc(opt) + '</button>';
  }

  return '<div class="body" style="padding:14px">' +
    '<div class="pip-row">' + pipHtml + '</div>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
      '<span class="step-badge">' + stageLabel + '</span>' +
      '<span style="font-size:.82rem;color:rgba(26,26,46,.4)">' + (qI+1) + '/' + qs.length + '</span>' +
    '</div>' +
    '<div class="card" style="margin-bottom:12px">' +
      '<div class="big-word">' + esc(q.q) + '</div>' +
      '<div class="hint">Doğru karşılığı seç</div>' +
      '<div class="opts">' + optsHtml + '</div>' +
    '</div>' +
  '</div>';
}

function ansQ(oi) {
  if (qAns) return;
  var qs = stage === 1 ? q1 : q2;
  var q = qs[qI];
  qAns = q.opts[oi];
  if (qAns === q.a) qScore++;
  R();
  setTimeout(function() {
    qAns = null;
    if (qI + 1 >= qs.length) {
      if (stage === 1) { stage = 2; qI = 0; }
      else { qI = qs.length; } // bitti trigger
    } else {
      qI++;
    }
    R();
  }, 900);
}

function goHome() {
  screen = 'home'; R();
}

// PRATİK
// ══════════════════════════════════════
function startPratik(mod) {
  var pool = shuf(GROUPS.reduce(function(a,g){return a.concat(g.words);},[]));
  var all = GROUPS.reduce(function(a,g){return a.concat(g.words);},[]);
  pratikMod = mod;
  screen = 'pratik';
  if (mod === 'flashcard') {
    fcW = pool; fcI = 0; fcFlipped = false; fcOk = 0; fcNo = 0;
  } else if (mod === 'harfdizme') {
    hdW = pool; hdI = 0; hdInp = ''; hdFb = null;
  } else if (mod === 'dinlesec') {
    dsW = pool.map(function(w) {
      var d = shuf(all.filter(function(x){return x.de!==w.de;})).slice(0,3).map(function(o){return o.tr;});
      return {de:w.de, tr:w.tr, opts:shuf([w.tr].concat(d))};
    });
    dsI = 0; dsAns = null;
    setTimeout(function(){ spk(dsW[0].de,'de'); }, 400);
  } else if (mod === 'hizturu') {
    if (htTimer) clearInterval(htTimer);
    htW = shuf(pool); htI = 0; htInp = ''; htSc = 0; htT = 30; htDone = false; htFb = null;
    htTimer = setInterval(function() {
      htT--;
      if (htT <= 0) { clearInterval(htTimer); htDone = true; }
      R();
    }, 1000);
  }
  R();
}

function pratikBack() {
  if (htTimer) clearInterval(htTimer);
  pratikMod = null; screen = 'home'; tab = 'pratik'; R();
}

function renderPratikScreen() {
  if (pratikMod === 'flashcard') return renderFC();
  if (pratikMod === 'harfdizme') return renderHD();
  if (pratikMod === 'dinlesec') return renderDS();
  if (pratikMod === 'hizturu') return renderHT();
  return '';
}

function pratikHdr(title, sub, cur, total) {
  var pct = total > 0 ? Math.round(cur / total * 100) : 0;
  return '<div class="ph">' +
    '<div class="ph-top">' +
      '<button class="ph-back" onclick="pratikBack()">←</button>' +
      '<div>' +
        '<div style="font-weight:700;font-size:1rem">' + title + '</div>' +
        '<div style="font-size:.74rem;opacity:.75">' + sub + '</div>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:.7rem;opacity:.75;margin-bottom:4px">' +
      '<span>' + cur + '/' + total + '</span><span>' + pct + '%</span>' +
    '</div>' +
    '<div class="ph-bar"><div class="ph-fill" style="width:' + pct + '%"></div></div>' +
  '</div>';
}

// Flashcard
function renderFC() {
  if (fcI >= fcW.length) {
    return pratikHdr('Flashcard 🃏','Tamamlandı',fcW.length,fcW.length) +
      '<div class="card" style="text-align:center;padding:28px 20px">' +
        '<div style="font-size:2rem;margin-bottom:8px">🏁</div>' +
        '<div style="font-weight:700;margin-bottom:6px">Tamamlandı!</div>' +
        '<div style="color:rgba(26,26,46,.5);margin-bottom:18px">✅ ' + fcOk + ' · ❌ ' + fcNo + '</div>' +
        '<button class="btn btn-p" onclick="pratikBack()">← Pratik Menüsü</button>' +
      '</div>';
  }
  var w = fcW[fcI];
  var front = '<div style="font-family:\'DM Serif Display\',serif;font-size:2.6rem;color:#3a5bd9;font-weight:700;margin-bottom:10px">' + esc(w.de) + '</div>' +
    '<div style="font-size:.8rem;color:rgba(26,26,46,.4)">👆 Çevirmek için dokun</div>';
  var back = '<div style="font-size:.75rem;color:rgba(26,26,46,.4);margin-bottom:6px">Türkçe</div>' +
    '<div style="font-family:\'DM Serif Display\',serif;font-size:1.9rem;color:#1a1a2e;margin-bottom:5px">' + esc(w.tr) + '</div>' +
    '<div style="font-size:.78rem;font-style:italic;color:rgba(26,26,46,.4)">' + esc(w.tr_s) + '</div>';
  var actionBtns = fcFlipped ?
    '<div style="display:flex;gap:10px;margin-top:10px">' +
      '<button class="btn" style="background:rgba(224,85,85,.12);color:#e05555;border:1px solid rgba(224,85,85,.2);margin-top:0" onclick="fcAns(false)">❌ Bilmedim</button>' +
      '<button class="btn" style="background:rgba(46,204,138,.12);color:#16a065;border:1px solid rgba(46,204,138,.25);margin-top:0" onclick="fcAns(true)">✅ Bildim</button>' +
    '</div>' : '';
  return pratikHdr('Flashcard 🃏','Kartı çevir',fcI,fcW.length) +
    '<div style="display:flex;justify-content:space-around;margin-bottom:16px">' +
      '<div><div class="sval">' + fcOk + '</div><div class="slbl">✅ Bildim</div></div>' +
      '<div><div class="sval">' + fcNo + '</div><div class="slbl">❌ Bilmedim</div></div>' +
      '<div><div class="sval">' + (fcW.length-fcI) + '</div><div class="slbl">📋 Kaldı</div></div>' +
    '</div>' +
    '<div class="card fc-card" onclick="fcFlip()">' + (fcFlipped ? back : front) + '</div>' +
    '<button class="btn btn-o" onclick="fcFlip()">Çevir 🔄</button>' +
    actionBtns;
}
function fcFlip() { fcFlipped = !fcFlipped; if(fcFlipped) spk(fcW[fcI].de,'de'); R(); }
function fcAns(ok) { if(ok) fcOk++; else fcNo++; fcI++; fcFlipped=false; R(); }

// Harf Dizme
function renderHD() {
  var w = hdW[hdI % hdW.length];
  var sc = shuf(w.de.split(''));
  var lettersHtml = '';
  for (var i = 0; i < sc.length; i++) {
    lettersHtml += '<span class="letter-box">' + esc(sc[i]) + '</span>';
  }
  var fbHtml = '';
  if (hdFb) {
    fbHtml = '<div class="' + (hdFb.ok ? 'fb-ok' : 'fb-no') + '">' + esc(hdFb.msg) + '</div>';
  }
  var inpCls = 'inp' + (hdFb ? (hdFb.ok ? ' inp-ok' : ' inp-no') : '');
  return pratikHdr('Harf Dizme 🔤','Harfleri sırala',hdI,hdW.length) +
    '<div class="card">' +
      '<div style="font-size:.76rem;color:rgba(26,26,46,.4);margin-bottom:10px">Türkçesi: <strong>' + esc(w.tr) + '</strong></div>' +
      '<div class="letters">' + lettersHtml + '</div>' +
      '<input id="hd-inp" class="' + inpCls + '" value="' + esc(hdInp) + '" placeholder="Fiili yaz…"' +
        ' oninput="hdInp=this.value" onkeydown="if(event.key===\'Enter\')checkHD()"' +
        (hdFb ? ' disabled' : '') + '>' +
      fbHtml +
    '</div>' +
    '<button class="btn btn-p" onclick="checkHD()" ' + (hdFb?'disabled':'') + '>Kontrol Et</button>';
}
function checkHD() {
  if (hdFb) return;
  var w = hdW[hdI % hdW.length];
  var ok = hdInp.trim().toLowerCase() === w.de.toLowerCase();
  hdFb = {ok:ok, msg: ok ? '✓ Doğru!' : '✗ Doğrusu: ' + w.de};
  R();
  setTimeout(function(){ hdFb=null; hdInp=''; hdI++; R(); }, ok?800:1400);
}

// Dinle & Seç
function renderDS() {
  var q = dsW[dsI % dsW.length];
  var optsHtml = '';
  for (var i = 0; i < q.opts.length; i++) {
    var opt = q.opts[i];
    var ocls = 'opt';
    if (dsAns) { if(opt===q.tr) ocls+=' opt-ok'; else if(opt===dsAns) ocls+=' opt-no'; }
    optsHtml += '<button class="' + ocls + '" ' + (dsAns?'disabled':'') + ' onclick="ansDS(' + i + ')">' + esc(opt) + '</button>';
  }
  return pratikHdr('Dinle & Seç 👂','Sesi dinle, seç',dsI,dsW.length) +
    '<div class="card" style="text-align:center;margin-bottom:12px">' +
      '<button style="width:76px;height:76px;border-radius:50%;background:#3a5bd9;border:none;font-size:1.9rem;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 20px rgba(58,91,217,.3)" onclick="spkDS()">🔊</button>' +
      '<div style="font-family:\'DM Serif Display\',serif;font-size:2.2rem;color:#3a5bd9;font-weight:700">' + esc(q.de) + '</div>' +
    '</div>' +
    '<div class="opts">' + optsHtml + '</div>' +
    '<button class="btn btn-o" style="margin-top:12px" onclick="skipDS()">Atla →</button>';
}
function spkDS() { spk(dsW[dsI % dsW.length].de, 'de'); }
function ansDS(i) {
  if (dsAns) return;
  var q = dsW[dsI % dsW.length];
  dsAns = q.opts[i]; R();
  setTimeout(function(){ dsAns=null; dsI++; if(dsI<dsW.length) setTimeout(function(){spk(dsW[dsI].de,'de');},300); R(); }, 1000);
}
function skipDS() { dsAns=null; dsI++; if(dsI<dsW.length) setTimeout(function(){spk(dsW[dsI].de,'de');},300); R(); }

// Hız Turu
function renderHT() {
  if (htDone) {
    return pratikHdr('Hız Turu ⚡','Bitti!',30,30) +
      '<div class="card" style="text-align:center;padding:28px 20px">' +
        '<div style="font-size:2rem;margin-bottom:6px">⚡</div>' +
        '<div style="font-family:\'DM Serif Display\',serif;font-size:3rem;color:#3a5bd9;font-weight:700">' + htSc + '</div>' +
        '<div style="color:rgba(26,26,46,.5);margin-bottom:18px">doğru · 30 saniyede</div>' +
        '<button class="btn btn-p" onclick="pratikBack()">← Pratik</button>' +
      '</div>';
  }
  var w = htW[htI % htW.length];
  var barColor = htT < 10 ? '#ff6b6b' : 'rgba(255,255,255,.9)';
  var borderColor = htFb ? (htFb.ok ? '#2ecc8a' : '#e05555') : 'transparent';
  return '<div class="ph">' +
    '<div class="ph-top">' +
      '<button class="ph-back" onclick="pratikBack()">←</button>' +
      '<div><div style="font-weight:700;font-size:1rem">Hız Turu ⚡</div><div style="font-size:.74rem;opacity:.75">30 saniyede çok kelime!</div></div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
      '<span style="font-size:1.4rem;font-weight:700">' + htT + 's</span>' +
      '<span style="opacity:.8">' + htSc + ' doğru</span>' +
    '</div>' +
    '<div class="ph-bar"><div class="ph-fill" style="width:' + (htT/30*100) + '%;background:' + barColor + '"></div></div>' +
  '</div>' +
  '<div class="card" style="text-align:center;padding:22px 18px;margin-bottom:12px;border-top:3px solid ' + borderColor + '">' +
    '<div style="font-family:\'DM Serif Display\',serif;font-size:2.2rem;color:#3a5bd9;font-weight:700;margin-bottom:6px">' + esc(w.de) + '</div>' +
    '<div style="font-size:.8rem;color:rgba(26,26,46,.4)">Türkçesi nedir?</div>' +
  '</div>' +
  '<input id="ht-inp" class="inp" value="' + esc(htInp) + '" placeholder="Türkçe…"' +
    ' oninput="htInp=this.value" onkeydown="if(event.key===\'Enter\')checkHT()" autofocus>' +
  '<button class="btn btn-p" onclick="checkHT()">Kontrol Et</button>';
}
function checkHT() {
  if (htDone) return;
  var w = htW[htI % htW.length];
  var ok = htInp.trim().toLowerCase() === w.tr.toLowerCase().split('/')[0].trim();
  htFb = {ok:ok}; if(ok) htSc++;
  R();
  setTimeout(function(){ htFb=null; htInp=''; htI++; R(); }, ok?300:600);
}

function setTab(t) { tab=t; pratikMod=null; screen='home'; R(); }

// ICON & PWA
// ══════════════════════════════════════
function makeIcon() {
  var c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  var ctx = c.getContext('2d');
  // Arka plan gradient
  var g = ctx.createLinearGradient(0,0,512,512);
  g.addColorStop(0,'#3a5bd9');
  g.addColorStop(1,'#6b4fd8');
  ctx.fillStyle = g;
  // Yuvarlak köşe
  ctx.beginPath();
  ctx.moveTo(110,0); ctx.lineTo(402,0);
  ctx.quadraticCurveTo(512,0,512,110);
  ctx.lineTo(512,402);
  ctx.quadraticCurveTo(512,512,402,512);
  ctx.lineTo(110,512);
  ctx.quadraticCurveTo(0,512,0,402);
  ctx.lineTo(0,110);
  ctx.quadraticCurveTo(0,0,110,0);
  ctx.closePath();
  ctx.fill();
  // Bayrak şeritleri (Almanya)
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(80,130,352,65);
  ctx.fillStyle = '#cc0000'; ctx.fillRect(80,210,352,65);
  ctx.fillStyle = '#ffce00'; ctx.fillRect(80,290,352,65);
  // DE yazısı
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = 'bold 160px Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('DE', 256, 220);
  // A1 yazısı
  ctx.font = 'bold 90px Georgia,serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('A1', 256, 380);
  return c.toDataURL('image/png');
}

(function() {
  var iconUrl = makeIcon();
  // Apple touch icon
  var link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = iconUrl;
  document.head.appendChild(link);
  // Favicon
  var fav = document.createElement('link');
  fav.rel = 'icon'; fav.type = 'image/png';
  fav.href = iconUrl;
  document.head.appendChild(fav);
})();

// Install prompt (Android Chrome)
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  var btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'block';
});
function installApp() {
  if (!deferredPrompt) {
    alert('Ana ekrana eklemek için tarayıcı menüsünden "Ana ekrana ekle" seçeneğini kullan.');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){ deferredPrompt=null; document.getElementById('install-btn').style.display='none'; });
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
R();
</script>
